name: Reusable Deploy

on:
  workflow_call:

    inputs:

      namespace:
        required: true
        type: string

      image-tag:
        required: true
        type: string

jobs:

  deploy:
    if: always()
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Deploy
        run: |
          echo "Deploying"

          echo "${{ inputs.namespace }}"

          echo "${{ inputs.image-tag }}"

      - name: Verify
        if: always()
        run: |
          echo "Verification completed"